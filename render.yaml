services:
  - type: web
    name: influxity-ai
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_URL
        value: https://influxity.ai
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PROFESSIONAL
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: STRIPE_PRICE_RECOVER
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: FROM_EMAIL
        value: sean@influxity.ai
      - key: SENDGRID_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
